<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>OBEscape</title>
  <style>
    body {
      margin: 0;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
    }
    canvas {
      /* Scale the canvas to fit any screen while preserving the 800x600 aspect ratio.
         The internal drawing resolution stays 800x600 — only the display size changes. */
      max-width: 100%;
      max-height: 100vh;
      width: auto;
      height: auto;
      display: block;
      touch-action: none; /* stop the browser intercepting taps/swipes on the canvas */
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="800" height="600"></canvas>
  <script src="renderer.js"></script>
  <script src="mapgen.js"></script>
  <script src="entities.js"></script>
  <script src="items.js"></script>
  <script src="debug.js"></script>
  <script src="player.js"></script>
  <script src="ui.js"></script>
  <script src="version.js"></script>
  <script src="main.js"></script>
</body>
</html>
